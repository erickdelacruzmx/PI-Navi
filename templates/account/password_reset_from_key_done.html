{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contraseña actualizada en Navi">
    <title>Contraseña actualizada | Navi</title>
    <script src="{% static 'js/auth-theme.js' %}"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body class="login-body">
    <div class="login-container">
        <main class="login-box" role="main">
            <div class="auth-topbar">
                <a href="{% url 'landing:index' %}" class="auth-back-btn" aria-label="Volver a la landing">
                    <i class="fas fa-arrow-left" aria-hidden="true"></i>
                    <span>Volver</span>
                </a>
                <a href="{% url 'landing:index' %}" class="auth-brand" aria-label="Ir al inicio">
                    <img src="{% static 'images/logo.png' %}" alt="Navi">
                </a>
            </div>
            <header class="login-header">
                <h1>¡Perfecto!</h1>
                <p>Tu contraseña se actualizó correctamente.</p>
                <h2>Acceso recuperado</h2>
            </header>
            <footer class="login-footer">
                <p><a href="{% url 'account_login' %}" class="btn-register-link">Iniciar sesión ahora</a></p>
            </footer>
        </main>
    </div>

    <script src="{% static 'js/auth-ui.js' %}"></script>
</body>
</html>
