<!-- ============================================
    SECCION DEDICADA NAVI - Chat IA
    ============================================ -->
<div v-if="currentSection === 'navi'"
     class="w-full flex flex-col items-center justify-start gap-3 sm:gap-4 md:gap-5 overflow-hidden transition-all duration-500 navi-hero py-3"
     :class="currentMode === 'tutor' ? 'navi-hero--tutor' : 'navi-hero--full'">

    <div class="mt-1 sm:mt-1 md:mt-2">
        <div class="mode-switch">
            <button class="mode-btn" :class="{active: currentMode === 'tutor'}" @click="currentMode = 'tutor'">
                Tutor
            </button>
            <button class="mode-btn" :class="{active: currentMode === 'navicito'}" @click="currentMode = 'navicito'">
                Navicito
            </button>
        </div>
    </div>

    <div class="navi-chat-layout navi-chat-layout--solo w-full max-w-6xl px-3 sm:px-4 md:px-6 lg:px-8">
        <aside class="navi-chat-aside">
            <div class="navi-circle navi-hero-shadow"
                 :class="{'talking': naviLoading || naviSpeaking, 'listening': naviListening}"
                 @click="toggleNaviVoiceInput"
                 @keydown.enter.prevent="toggleNaviVoiceInput"
                 @keydown.space.prevent="toggleNaviVoiceInput"
                 role="button"
                 tabindex="0"
                 :aria-label="naviListening ? 'Detener escucha de Navi' : 'Activar escucha de Navi'">
            </div>
            <p class="navi-aside-text">Navi te ayuda por voz. Toca el circulo para hablar y vuelve a tocar para detener escucha.</p>
            <p class="navi-live-region" aria-live="polite">[[ naviStatusMessage ]]</p>
            <p v-if="!naviVoiceSupported" class="navi-voice-warning">
                Tu navegador no permite dictado por voz. Prueba con Edge o Chrome y habilita microfono.
            </p>
            <p class="navi-live-region" aria-live="assertive">[[ naviError ]]</p>
        </aside>
    </div>
</div>
